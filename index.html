<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasa API - APOD Explorer</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>
<body>

    <video autoplay muted loop id="video-fondo">
        <source src="css/video/video1 (2).mp4" type="video/mp4">
        Tu navegador no soporta videos de fondo.
    </video>

    <header class="bg-black text-center py-5 mb-4 border-bottom border-secondary">
        <div class="container">
            <h1 class="fw-bold text-white display-4">Astronomy Picture of the Day</h1>
            <p class="lead text-info">Explora el cosmos con la API oficial de la NASA</p>
        </div>
    </header>

    <main class="container my-4">
        <div class="row g-4">
            
            <section class="col-lg-8">
                
                <div class="card card-custom p-4 mb-4 shadow">
                    <div class="row align-items-center">
                        <div class="col-md-4">
                            <label for="selector-fecha" class="form-label fw-bold text-info mb-md-0">Buscar por fecha:</label>
                        </div>
                        <div class="col-md-8">
                            <input type="date" id="selector-fecha" class="form-control bg-dark text-white border-info" min="1995-06-16">
                        </div>
                    </div>
                </div>

                <div id="pantalla-principal" class="card card-custom p-4 shadow text-center">
                    <div class="py-5">
                        <div class="spinner-border text-info mb-3" role="status"></div>
                        <p class="text-muted">Conectando con los telescopios de la NASA...</p>
                    </div>
                    
                    <div class="mt-3">
                        <button id="btn-favorito" class="btn btn-outline-warning">
                            ⭐ Guardar en Mis Favoritos
                        </button>
                    </div>
                </div>

            </section>

            <aside class="col-lg-4">
                <div class="card card-custom p-4 shadow h-100">
                    <h2 class="h4 text-warning mb-3 border-bottom border-secondary pb-2">Mis Favoritos ⭐</h2>
                    
                    <ul id="lista-favoritos" class="list-group list-group-flush rounded bg-transparent">
                        <li class="list-group-item bg-transparent text-muted small px-0">No has guardado imágenes aún.</li>
                    </ul>
                </div>
            </aside>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/favoritos.js"></script>
    <script type="module" src="js/fechas.js"></script>
</body>
</html>
